name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          architecture: x64

      - name: Install Dependencies
        run: flutter pub get

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: Install Fastlane
        run: |
          cd ios
          gem install bundler
          bundle init
          bundle add fastlane
          
      - name: Create Simple Build Script (instead of Fastlane)
        run: |
          cat > ios/build_ipa.sh << 'EOF'
          #!/bin/bash
          
          echo "Starting simple IPA packaging process..."
          
          # Check if Flutter build output exists
          if [ -d "../build/ios/iphoneos/Runner.app" ]; then
            echo "Found Flutter build output at ../build/ios/iphoneos/Runner.app"
            
            # Create necessary directories
            mkdir -p build/Payload
            
            # Copy the app to Payload directory
            cp -R ../build/ios/iphoneos/Runner.app build/Payload/
            
            # Create IPA by zipping the Payload directory
            cd build
            zip -r ../Runner.ipa Payload
            cd ..
            
            # Verify IPA was created
            if [ -f "Runner.ipa" ]; then
              echo "SUCCESS: IPA created at Runner.ipa"
              ls -la Runner.ipa
              return 0
            else
              echo "ERROR: Failed to create IPA"
              return 1
            fi
          else
            echo "ERROR: Flutter build output not found!"
            return 1
          fi
          EOF
          
          chmod +x ios/build_ipa.sh

      - name: Install Bundler Dependencies (Optional)
        run: |
          cd ios
          bundle install || echo "Bundler install failed but continuing..."
          
      - name: Build iOS App
        id: build
        run: |
          # Set environment variables for Flutter
          export PATH="$PATH:$HOME/.pub-cache/bin"
          
          # First, run Flutter build in the project root directory
          echo "Building Flutter iOS app..."
          flutter build ios --no-codesign --release --verbose > flutter_build.log 2>&1
          echo "Flutter build completed with exit code: $?"
          
          # Show detailed directory structure to understand what's being generated
          echo "Project root structure after Flutter build:"
          find . -type d -maxdepth 3
          
          # Check Flutter build output specifically
          echo "Flutter build iOS output:"
          ls -la
          ls -la build/ 2>/dev/null || echo "No build directory found at root"
          ls -la ios/build/ 2>/dev/null || echo "No build directory found in ios"
          
          # Create a simple IPA package from Flutter's build output for testing
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "Creating test IPA package..."
            mkdir -p ios/build
            cd ios/build
            mkdir -p Payload
            cp -R ../../build/ios/iphoneos/Runner.app Payload/
            zip -r ../Runner.ipa Payload
            echo "Test IPA created at ios/Runner.ipa"
            ls -la ..
          else
            echo "ERROR: Runner.app not found in expected location"
            find . -name "Runner.app" 2>/dev/null || echo "Runner.app not found anywhere"
          fi
          
      - name: Comprehensive Build Results Check
        run: |
          echo "===== COMPREHENSIVE BUILD DIAGNOSTICS ===="
          
          # 1. Find all possible build artifacts throughout the project
          echo "\nSearching for all potential build artifacts..."
          find . -name "*.ipa" -o -name "*.app" -o -name "*.xcarchive" 2>/dev/null
          
          # 2. Check Flutter build directory structure
          echo "\nFlutter build directory structure:"
          find build -type d 2>/dev/null || echo "No build directory found"
          
          # 3. Check iOS directory structure
          echo "\niOS directory structure:"
          find ios -type d -maxdepth 3 2>/dev/null
          
          # 4. List specific key locations
          echo "\nContents of ios/ (root level):"
          ls -la ios/
          
          echo "\nContents of build/ (if exists):"
          ls -la build/ 2>/dev/null || echo "build/ not found"
          
          echo "\nContents of build/ios/ (if exists):"
          ls -la build/ios/ 2>/dev/null || echo "build/ios/ not found"
          
          # 5. Check for Runner.app specifically
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "\nSUCCESS: Runner.app found at build/ios/iphoneos/Runner.app"
            ls -la build/ios/iphoneos/Runner.app 2>/dev/null
          else
            echo "\nERROR: Runner.app not found in expected location"
            find . -name "Runner.app" 2>/dev/null || echo "Runner.app not found anywhere"
          fi
          
          # 6. Check for IPA file
          if [ -f "ios/Runner.ipa" ]; then
            echo "\nSUCCESS: IPA file found at ios/Runner.ipa"
            ls -la ios/Runner.ipa
          else
            echo "\nERROR: IPA file not found at ios/Runner.ipa"
          fi
          
          # 7. Try to create IPA if it doesn't exist
          if [ ! -f "ios/Runner.ipa" ] && [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "\nAttempting to create IPA file..."
            cd ios
            ./build_ipa.sh
          fi
          
      - name: Display Build Logs
        if: always()
        run: |
          echo "Displaying Flutter build logs..."
          if [ -f "flutter_build.log" ]; then
            cat flutter_build.log
          fi
          
          echo "Displaying any other logs..."
          find . -name "*.log" 2>/dev/null

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # Use broader search paths to find any build artifacts
          path: |
            build/ios/iphoneos/Runner.app
            ios/Runner.ipa
            ios/*.ipa
            **/*.ipa
            **/*.app
          retention-days: 5
          if-no-files-found: error
