name: Build Flutter iOS Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios:
    name: Build unsigned iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Prepare iOS project
        run: |
          flutter build ios \
            --release \
            --config-only

      - name: Install CocoaPods
        working-directory: ios
        run: |
          pod install --repo-update

      - name: Build unsigned archive
        working-directory: ios
        run: |
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Extract unsigned app
        run: |
          mkdir -p Payload

          cp -r \
          ios/build/Runner.xcarchive/Products/Applications/Runner.app \
          Payload/

      - name: Create unsigned IPA
        run: |
          zip -r \
          Flutter-Unsigned.ipa \
          Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flutter-iOS-Unsigned-IPA
          path: Flutter-Unsigned.ipa
