name: inter_knot
description: 绳网是一个游戏、技术交流平台
publish_to: none
version: 0.5.0+1
repository: https://github.com/yinengbei/inter-knot

environment:
  sdk: ">=3.4.4 <4.0.0"

dependencies:
  cached_network_image: ^3.4.1
  dio: ^5.9.1
  extended_text: ^14.2.2
  flutter:
    sdk: flutter
  flutter_client_sse: ^2.0.3
  flutter_gen: ^5.6.0
  flutter_keyboard_visibility: ^6.0.0
  flutter_localizations:
    sdk: flutter
  flutter_quill: ^11.5.0
  flutter_quill_extensions: ^11.0.0
  flutter_widget_from_html: 0.15.3
  gal: ^2.3.2
  get: ^4.6.6
  html: ^0.15.4
  http: ^1.2.0
  flutter_image_compress: ^2.4.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  logger: ^2.4.0
  markdown: ^7.3.0
  markdown_quill: ^4.3.0
  markdown_widget: 2.3.2+8
  android_intent_plus: ^5.1.0
  open_file: ^3.5.9
  package_info_plus: ^8.1.2
  path_provider: ^2.1.5
  photo_view: ^0.15.0
  shared_preferences: ^2.3.2
  share_plus: ^11.1.0
  url_launcher: ^6.3.0
  waterfall_flow: ^3.0.3
  web_socket_channel: ^3.0.3
  flutter_skill: ^0.9.6

dev_dependencies:
  build_runner: ^2.4.12
  flutter_gen_runner: ^5.6.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  lint: ^2.0.0

dependency_overrides:
  quill_native_bridge_windows: 0.0.1

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: icon.webp

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/fonts/
  fonts:
    - family: ZhCn
      fonts:
        - asset: assets/fonts/zh-cn.ttf
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.woff2


